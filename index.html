<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olá, Nuvem</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    main {
      text-align: center;
      padding: 30px;
      max-width: 520px;
    }

    h1 {
      font-size: 42px;
      margin: 0 0 10px;
    }

    #status {
      font-size: 18px;
      color: #cbd5e1;
      min-height: 54px;
      line-height: 1.5;
    }

    button {
      margin-top: 18px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #7dd3fc;
    }
  </style>
</head>

<body>
  <main>
    <h1>Olá, Nuvem</h1>
    <p id="status">Carregando a resposta do servidor...</p>
    <button id="btn">Buscar de novo</button>
  </main>

  <script>
    // PASSO DO MOVIMENTO 4:
    // Troque o texto abaixo pela URL do SEU Worker (termina em .workers.dev).
    const URL_DO_WORKER = "COLE_AQUI_A_URL_DO_SEU_WORKER";

    async function buscar() {
      const status = document.getElementById("status");
      status.textContent = "Buscando...";
      try {
        const resposta = await fetch(URL_DO_WORKER);
        const dados = await resposta.json();
        status.textContent = dados.mensagem + " Hora do servidor: " + dados.horaDoServidor;
      } catch (erro) {
        status.textContent = "Não consegui falar com o Worker. Confira a URL.";
      }
    }

    document.getElementById("btn").addEventListener("click", buscar);
    buscar();
  </script>
</body>

</html>
